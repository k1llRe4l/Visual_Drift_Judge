<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Drift Judge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<button class="back-button" type="button" onclick="window.history.back()" aria-label="Go back">
    <img src="{{ url_for('static', filename='img/arrow.png') }}" alt="">
</button>
<main class="page-shell">
    <section class="upload-panel">
        <p class="eyebrow">Visual Drift Judge</p>
        <h2>Upload a drift clip for scoring</h2>
        <p class="subtitle">
            Drag and drop a video into the area below, or click to choose a file.
            Then press the Process Video button to evaluate a clip.
        </p>

        <form id="upload-form" class="upload-form">
            <label id="drop-zone" class="drop-zone" for="video-input">
                <input id="video-input" name="video" type="file" accept="video/*" hidden>
                <span class="drop-zone-title">Drop your video here</span>
                <span class="drop-zone-text">MP4, MOV, AVI, MKV, WEBM, MPEG, MPG</span>
                <span id="selected-file" class="selected-file">No file selected</span>
            </label>

            <button id="submit-button" class="submit-button upload-submit-button" type="submit">Process Video</button>
        </form>

        <section id="progress-panel" class="progress-panel" hidden>
            <div class="progress-bar-track">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
            <div class="progress-meta">
                <span id="progress-counter">0 / 0 evaluated frames</span>
                <span id="progress-eta">Estimating time...</span>
            </div>
            <section class="log-panel">
                <p class="log-title">Processing log</p>
                <pre id="log-output" class="log-output">Waiting for processing to start...</pre>
            </section>
        </section>
    </section>
</main>

<script>
    const form = document.getElementById('upload-form');
    const input = document.getElementById('video-input');
    const dropZone = document.getElementById('drop-zone');
    const selectedFile = document.getElementById('selected-file');
    const submitButton = document.getElementById('submit-button');
    const progressPanel = document.getElementById('progress-panel');
    const progressBarFill = document.getElementById('progress-bar-fill');
    const progressCounter = document.getElementById('progress-counter');
    const progressEta = document.getElementById('progress-eta');
    const logOutput = document.getElementById('log-output');
    let activeJobId = null;
    let pollHandle = null;

    const formatEta = (etaSeconds) => {
        if (etaSeconds === null || etaSeconds === undefined || Number.isNaN(etaSeconds)) {
            return 'Estimating time...';
        }

        const rounded = Math.max(0, Math.ceil(etaSeconds));
        const minutes = Math.floor(rounded / 60);
        const seconds = rounded % 60;
        return `Estimated time left: ${minutes}:${String(seconds).padStart(2, '0')}`;
    };

    const setLogOutput = (lines) => {
        logOutput.textContent = Array.isArray(lines) ? lines.join('\n') : String(lines || '');
    };

    const updateSubmitButtonState = () => {
        submitButton.classList.toggle('is-ready', input.files.length > 0);
    };

    const updateSelectedFile = () => {
        if (input.files.length > 0) {
            selectedFile.textContent = input.files[0].name;
        } else {
            selectedFile.textContent = 'No file selected';
        }
        updateSubmitButtonState();
    };

    const updateProgress = (job) => {
        const totalFrames = job.total_evaluated_frames || 0;
        const evaluatedFrames = job.evaluated_frames || 0;
        const percent = totalFrames > 0 ? Math.min((evaluatedFrames / totalFrames) * 100, 100) : 0;

        progressBarFill.style.width = `${percent}%`;
        progressCounter.textContent = `${evaluatedFrames} / ${totalFrames} evaluated frames`;
        progressEta.textContent = formatEta(job.eta_seconds);
        setLogOutput(job.logs || []);
    };

    const stopPolling = () => {
        if (pollHandle !== null) {
            window.clearInterval(pollHandle);
            pollHandle = null;
        }
    };

    const pollJobStatus = async () => {
        if (!activeJobId) {
            return;
        }

        try {
            const response = await fetch(`/process/${activeJobId}`);
            const job = await response.json();

            if (!response.ok) {
                throw new Error(job.error || 'Could not read processing status.');
            }

            updateProgress(job);

            if (job.status === 'completed') {
                stopPolling();
                submitButton.disabled = false;
                updateSubmitButtonState();
            } else if (job.status === 'failed') {
                stopPolling();
                submitButton.disabled = false;
                updateSubmitButtonState();
            }
        } catch (error) {
            stopPolling();
            submitButton.disabled = false;
            updateSubmitButtonState();
            setLogOutput([error.message]);
        }
    };

    ['dragenter', 'dragover'].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropZone.classList.add('is-dragging');
        });
    });

    ['dragleave', 'drop'].forEach((eventName) => {
        dropZone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropZone.classList.remove('is-dragging');
        });
    });

    dropZone.addEventListener('drop', (event) => {
        const files = event.dataTransfer.files;
        if (files.length > 0) {
            input.files = files;
            updateSelectedFile();
        }
    });

    input.addEventListener('change', updateSelectedFile);

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        if (!input.files.length) {
            progressPanel.hidden = false;
            setLogOutput(['Choose a video first.']);
            return;
        }

        const formData = new FormData();
        formData.append('video', input.files[0]);

        stopPolling();
        submitButton.disabled = true;
        progressPanel.hidden = false;
        progressBarFill.style.width = '0%';
        progressCounter.textContent = '0 / 0 evaluated frames';
        progressEta.textContent = 'Preparing evaluation...';
        setLogOutput(['Preparing evaluation...']);

        try {
            const response = await fetch('/process', {
                method: 'POST',
                body: formData,
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(data.error || 'Processing failed.');
            }

            const data = await response.json();
            activeJobId = data.job_id;
            pollHandle = window.setInterval(pollJobStatus, 1000);
            await pollJobStatus();
        } catch (error) {
            submitButton.disabled = false;
            updateSubmitButtonState();
            setLogOutput([error.message]);
        }
    });

    updateSubmitButtonState();
</script>
</body>
</html>
